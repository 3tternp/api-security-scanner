version: '3.8'

# Development overrides — mount source for hot-reload.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENVIRONMENT: development
    volumes:
      - ./backend:/app        # live-reload source
    entrypoint: []            # skip prestart.sh wait loop in dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    command: npm run dev -- --host
